<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>iTabs | Samson Swift</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg-primary:#0a0a0f;--bg-secondary:#12121a;--bg-tertiary:#1e1e2e;--text-primary:#fff;--text-secondary:#9090b0;--accent:#7c3aed;--accent2:#06b6d4;--i-button:#f59e0b;--transition:0.2s ease}
html,body{height:100%;overflow:hidden}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg-primary);color:var(--text-primary);line-height:1.5}
.container{max-width:430px;margin:0 auto;height:100%;display:flex;flex-direction:column;position:relative}
.progress-container{display:flex;gap:4px;padding:12px 16px 8px;position:absolute;top:0;left:0;right:0;z-index:100;background:linear-gradient(to bottom,rgba(0,0,0,0.9),transparent)}
.progress-segment{flex:1;height:3px;background:rgba(255,255,255,0.2);border-radius:2px;transition:background var(--transition)}
.progress-segment.viewed{background:rgba(255,255,255,0.6)}
.progress-segment.active{background:var(--accent)}
.cards-wrapper{flex:1;position:relative;overflow:hidden}
.card{position:absolute;inset:0;display:flex;flex-direction:column;opacity:0;transform:translateX(100%);transition:all 0.3s ease;pointer-events:none}
.card.active{opacity:1;transform:translateX(0);pointer-events:all}
.card.prev{opacity:0;transform:translateX(-100%)}
.card-hero{padding:52px 20px 20px;min-height:50%;display:flex;flex-direction:column;justify-content:flex-end;background-size:cover;background-position:center top;position:relative;overflow:hidden}
.hero-default{background-color:#0f172a}.hero-purple{background-color:#1e1b4b}.hero-cyan{background-color:#0c4a6e}.hero-amber{background-color:#431407}.hero-green{background-color:#052e16}.hero-red{background-color:#450a0a}
.card-hero > *{position:relative;z-index:1}
.card-tag{font-size:10px;font-weight:700;letter-spacing:.15em;color:rgba(255,255,255,0.7);text-transform:uppercase;margin-bottom:8px}
.tag-purple{color:#a78bfa}.tag-cyan{color:#67e8f9}.tag-amber{color:#fcd34d}.tag-green{color:#6ee7b7}.tag-red{color:#fca5a5}
.card-headline{font-size:clamp(20px,5vw,26px);font-weight:700;line-height:1.25;text-shadow:0 2px 8px rgba(0,0,0,0.5)}
em{font-style:normal}
.hero-default em{color:#cbd5e1}.hero-purple em{color:#a78bfa}.hero-cyan em{color:#67e8f9}.hero-amber em{color:#fcd34d}.hero-green em{color:#6ee7b7}.hero-red em{color:#fca5a5}
/* Links card */
.links-card-body{flex:1;overflow-y:auto;padding:16px 16px 20px;background:var(--bg-secondary);display:flex;flex-direction:column;gap:10px}
.link-tagline{font-size:12px;color:var(--text-secondary);text-align:center;padding-bottom:4px;border-bottom:1px solid rgba(255,255,255,0.06);padding-bottom:10px;margin-bottom:2px}
.link-btn{display:flex;align-items:center;justify-content:center;padding:14px 16px;background:var(--bg-tertiary);border:1px solid rgba(255,255,255,0.1);border-radius:12px;font-size:14px;font-weight:600;color:var(--text-primary);text-decoration:none;transition:all var(--transition);text-align:center}
.link-btn:hover{background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.2)}
.link-btn:active{transform:scale(0.98)}

/* Story card */
.card-body{flex:1;overflow-y:auto;padding:20px;background:var(--bg-secondary);display:flex;flex-direction:column;gap:14px}
.card-summary{font-size:15px;color:var(--text-secondary);line-height:1.7}
.analogy-box{background:var(--bg-tertiary);border-radius:12px;padding:14px 16px;border-left:3px solid var(--accent2)}
.analogy-title{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--accent2);margin-bottom:6px}
.analogy-text{font-size:13px;color:var(--text-secondary);line-height:1.6}
.i-buttons{display:flex;flex-wrap:wrap;gap:8px}
.i-button{display:flex;align-items:center;gap:6px;background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.3);border-radius:20px;padding:7px 14px;font-size:12px;font-weight:600;color:var(--i-button);cursor:pointer;transition:all var(--transition)}
.i-button:hover{background:rgba(245,158,11,0.2)}
.i-dot{width:16px;height:16px;background:var(--i-button);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#000;flex-shrink:0}
.donate-btn{display:flex;align-items:center;justify-content:center;gap:8px;background:linear-gradient(135deg,#dc2626,#b91c1c);color:#fff;font-size:15px;font-weight:700;border:none;border-radius:12px;padding:14px 20px;cursor:pointer;text-decoration:none;transition:opacity var(--transition)}
.donate-btn:hover{opacity:.88}
.social-bar{display:flex;align-items:center;justify-content:center;gap:14px;padding:6px 0 2px}
.social-link{display:flex;align-items:center;justify-content:center;width:42px;height:42px;border-radius:50%;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);color:var(--text-secondary);text-decoration:none;transition:all var(--transition)}
.social-link:hover{background:rgba(255,255,255,0.14);color:#fff}
.social-link.disabled{opacity:.3;cursor:default;pointer-events:none}
.social-label{font-size:10px;color:var(--text-secondary);text-align:center;letter-spacing:.05em}
.nav-area{display:flex;align-items:center;justify-content:space-between;padding:10px 20px 16px;background:var(--bg-secondary);border-top:1px solid rgba(255,255,255,0.06)}
.nav-btn{width:44px;height:44px;border-radius:50%;border:1px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.05);color:var(--text-primary);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all var(--transition)}
.nav-btn:hover:not(:disabled){background:rgba(255,255,255,0.12)}
.nav-btn:disabled{opacity:.3;cursor:not-allowed}
.card-counter{font-size:13px;font-weight:600;color:var(--text-secondary)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity var(--transition);z-index:999}
.modal-overlay.active{opacity:1;pointer-events:all}
.modal-sheet{width:100%;max-width:430px;margin:0 auto;background:var(--bg-tertiary);border-radius:20px 20px 0 0;padding:20px;transform:translateY(100%);transition:transform 0.3s ease}
.modal-overlay.active .modal-sheet{transform:translateY(0)}
.modal-handle{width:36px;height:4px;background:rgba(255,255,255,0.2);border-radius:2px;margin:0 auto 16px}
.modal-term{font-size:17px;font-weight:700;margin-bottom:4px}
.modal-type{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--i-button);margin-bottom:12px}
.modal-content{font-size:14px;color:var(--text-secondary);line-height:1.7}
.modal-close{margin-top:20px;width:100%;padding:12px;background:rgba(255,255,255,0.08);border:none;border-radius:10px;color:var(--text-primary);font-size:14px;font-weight:600;cursor:pointer}
</style>
</head>
<body>
<div class="container">
<div class="progress-container" id="progress"></div>
<div class="cards-wrapper" id="cardsWrapper"></div>
<div class="nav-area">
<button class="nav-btn" id="prevBtn" onclick="navigate(-1)">←</button>
<span class="card-counter" id="counter">1 / 6</span>
<button class="nav-btn" id="nextBtn" onclick="navigate(1)">→</button>
</div>
</div>
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
<div class="modal-sheet">
<div class="modal-handle"></div>
<div class="modal-term" id="modalTerm"></div>
<div class="modal-type" id="modalType"></div>
<div class="modal-content" id="modalContent"></div>
<button class="modal-close" onclick="closeModal()">Close</button>
</div>
</div>
<script>
const DONATE_BTN=`<a href="https://www.teamblackdog.org.au/fundraisers/mindthehundred/mindthehundred--mt100-?utm_source=ig&utm_medium=social&utm_content=link_in_bio" target="_blank" rel="noopener" class="donate-btn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>Sponsor Samson — Donate Now</a>`;
const SOCIAL_BAR=`<div class="social-bar"><div style="display:flex;flex-direction:column;align-items:center;gap:4px"><a href="https://www.instagram.com/samsonswiftt/" target="_blank" rel="noopener" class="social-link"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1.2" fill="currentColor" stroke="none"/></svg></a><span class="social-label">Instagram</span></div><div style="display:flex;flex-direction:column;align-items:center;gap:4px"><span class="social-link disabled"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34V8.69a8.18 8.18 0 0 0 4.78 1.52V6.75a4.85 4.85 0 0 1-1.01-.06z"/></svg></span><span class="social-label">TikTok</span></div><div style="display:flex;flex-direction:column;align-items:center;gap:4px"><span class="social-link disabled"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M23.5 6.19a3.02 3.02 0 0 0-2.13-2.14C19.55 3.6 12 3.6 12 3.6s-7.55 0-9.37.45A3.02 3.02 0 0 0 .5 6.19C.06 8.02 0 12 0 12s.06 3.98.5 5.81a3.02 3.02 0 0 0 2.13 2.14C4.45 20.4 12 20.4 12 20.4s7.55 0 9.37-.45a3.02 3.02 0 0 0 2.13-2.14C23.94 15.98 24 12 24 12s-.06-3.98-.5-5.81zM9.75 15.52V8.48L15.5 12l-5.75 3.52z"/></svg></span><span class="social-label">YouTube</span></div></div>`;
const cards=[{"type":"links","tag":"01 / LINKS","tagClass":"","headline":"<em>Samson Swift</em> — Links","heroClass":"hero-default","photo":"","overlay":0.6,"tagline":"18 · Endurance Athlete · Racing for Mental Health","links":[{"label":"❤️ Donate — Black Dog Institute","url":"https://www.teamblackdog.org.au/fundraisers/mindthehundred/mindthehundred--mt100-?utm_source=ig&utm_medium=social&utm_content=link_in_bio"},{"label":"📸 Instagram","url":"https://www.instagram.com/samsonswiftt/"},{"label":"▶️ YouTube","url":""},{"label":"🎵 TikTok","url":""}],"summary":"","analogy":null,"iButtons":[],"showDonate":false,"showSocials":false},{"type":"story","tag":"02 / ATHLETE","tagClass":"","headline":"Meet <em>Samson</em> — Endurance Athlete","heroClass":"hero-default","photo":"","overlay":0.55,"tagline":"","links":[],"summary":"At 18 years old, I'm self-coaching myself through two of endurance sport's toughest challenges simultaneously — an Ironman 70.3 and a 100km ultra. No coach. No team behind me. Just grit, a plan, and a reason bigger than myself.","analogy":null,"iButtons":[],"showDonate":false,"showSocials":false},{"type":"story","tag":"03 / MISSION","tagClass":"tag-red","headline":"Running <em>100km</em> for Mental Health","heroClass":"hero-red","photo":"","overlay":0.55,"tagline":"","links":[],"summary":"I'm running 100km for the Black Dog Institute — Australia's leading mental health research centre. Every kilometre is a chance to change the conversation around mental health.","analogy":null,"iButtons":[],"showDonate":true,"showSocials":false},{"type":"story","tag":"04 / EVENT","tagClass":"tag-cyan","headline":"Ironman 70.3 <em>Debut</em> on 22.03.26","heroClass":"hero-cyan","photo":"","overlay":0.55,"tagline":"","links":[],"summary":"Ironman 70.3 Debut on 22.03.26 — 1.9km swim · 90km bike · 21km run. Stacking two major events inside eight weeks.","analogy":null,"iButtons":[],"showDonate":false,"showSocials":false},{"type":"story","tag":"05 / TRAINING","tagClass":"tag-purple","headline":"Big <em>Weeks</em> in the Books","heroClass":"hero-purple","photo":"","overlay":0.55,"tagline":"","links":[],"summary":"Training hard 47 days out. Building in public — showing every session, every km.","analogy":null,"iButtons":[],"showDonate":false,"showSocials":false},{"type":"story","tag":"06 / SUPPORT","tagClass":"tag-green","headline":"Follow the <em>Journey</em> — Back the Cause","heroClass":"hero-green","photo":"","overlay":0.55,"tagline":"","links":[],"summary":"Samson Swift is racing for mental health. Follow the journey and support the cause.","analogy":null,"iButtons":[],"showDonate":true,"showSocials":true}];
let cur=0; const tot=cards.length;
const mo=document.getElementById('modalOverlay');

function buildCard(c,i){
const el=document.createElement('div');
el.className='card'+(i===0?' active':'');
const heroStyle=c.photo?`background-image:url('${c.photo}');background-size:cover;background-position:center top;`:'';
const overlayColor=`rgba(0,0,0,${c.overlay||0.55})`;

if(c.type==='links'){
    const linksHTML=c.links.map(l=>l.url
        ? `<a href="${l.url}" target="_blank" rel="noopener" class="link-btn">${l.label}</a>`
        : `<div class="link-btn" style="opacity:0.4;cursor:default">${l.label}</div>`
    ).join('');
    el.innerHTML=`
    <div class="card-hero ${c.heroClass}" style="${heroStyle}">
        <div style="position:absolute;inset:0;background:${overlayColor}"></div>
        <div class="card-tag ${c.tagClass}" style="position:relative;z-index:1">${c.tag}</div>
        <h2 class="card-headline" style="position:relative;z-index:1">${c.headline}</h2>
    </div>
    <div class="links-card-body">
        <div class="link-tagline">${c.tagline}</div>
        ${linksHTML}
    </div>`;
} else {
    const analogy=c.analogy?`<div class="analogy-box"><div class="analogy-title">${c.analogy.title}</div><div class="analogy-text">${c.analogy.text}</div></div>`:'';
    const ibtns=c.iButtons&&c.iButtons.length?`<div class="i-buttons">${c.iButtons.map(b=>`<button class="i-button" data-term="${b.term}" data-type="${b.type}" data-content="${encodeURIComponent(b.content)}"><span class="i-dot">i</span>${b.label}</button>`).join('')}</div>`:'';
    el.innerHTML=`
    <div class="card-hero ${c.heroClass}" style="${heroStyle}">
        <div style="position:absolute;inset:0;background:${overlayColor}"></div>
        <div class="card-tag ${c.tagClass}" style="position:relative;z-index:1">${c.tag}</div>
        <h2 class="card-headline" style="position:relative;z-index:1">${c.headline}</h2>
    </div>
    <div class="card-body">
        <p class="card-summary">${c.summary}</p>
        ${analogy}${ibtns}
        ${c.showDonate?DONATE_BTN:''}
        ${c.showSocials?SOCIAL_BAR:''}
    </div>`;
    el.querySelectorAll('.i-button').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();openModal(b.dataset.term,b.dataset.type,decodeURIComponent(b.dataset.content));}));
}
return el;
}

function init(){
const prog=document.getElementById('progress');
const wrap=document.getElementById('cardsWrapper');
cards.forEach((c,i)=>{
    const s=document.createElement('div');
    s.className='progress-segment'+(i===0?' active':'');
    prog.appendChild(s);
    wrap.appendChild(buildCard(c,i));
});
document.getElementById('counter').textContent=`1 / ${tot}`;
document.getElementById('prevBtn').disabled=true;
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')navigate(1);if(e.key==='ArrowLeft')navigate(-1);if(e.key==='Escape')closeModal();});
let sx=0; const cw=document.getElementById('cardsWrapper');
cw.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;},{passive:true});
cw.addEventListener('touchend',e=>{const d=sx-e.changedTouches[0].clientX;if(Math.abs(d)>50)navigate(d>0?1:-1);});
}
function navigate(dir){const n=cur+dir;if(n>=0&&n<tot)update(n);}
function update(idx){
document.querySelectorAll('.card').forEach((c,i)=>{c.classList.remove('active','prev');if(i===idx)c.classList.add('active');else if(i<idx)c.classList.add('prev');});
document.querySelectorAll('.progress-segment').forEach((s,i)=>{s.classList.remove('active','viewed');if(i===idx)s.classList.add('active');else if(i<idx)s.classList.add('viewed');});
cur=idx;
document.getElementById('counter').textContent=`${idx+1} / ${tot}`;
document.getElementById('prevBtn').disabled=idx===0;
document.getElementById('nextBtn').disabled=idx===tot-1;
}
function openModal(term,type,content){
const labels={'definition':'Definition','context':'Context','why-it-matters':'Why It Matters','related':'Related'};
document.getElementById('modalTerm').textContent=term;
document.getElementById('modalType').textContent=labels[type]||type;
document.getElementById('modalContent').textContent=content;
mo.classList.add('active');
}
function closeModal(){mo.classList.remove('active');}
init();
</script>
</body>
</html>
